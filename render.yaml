services:
  # 1. FastAPI Machine Learning Microservice (Python)
  - type: web
    name: milkosense-ml-service
    runtime: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  # 2. Node.js Express API Backend (Node)
  - type: web
    name: milkosense-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # User will provide their MongoDB Atlas URI (e.g. mongodb+srv://...) in the Render UI
      - key: ML_SERVICE_URL
        fromService:
          name: milkosense-ml-service
          type: web
          property: host
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_ML_API_KEY
        value: dev-key-milkosense

  # 3. Static React Vite Frontend (Static Site)
  - type: static
    name: milkosense-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # User will provide the backend's public URL (e.g. https://milkosense-backend.onrender.com) in the Render UI
    routes:
      - type: rewrite
        source: /*
        destination: /index.html




